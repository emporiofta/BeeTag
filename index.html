<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEETAG</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/150/4a443f/bee.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/150/4a443f/bee.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#bcaf9f">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #bcaf9f; --card: #fdfcfb; --text: #4a443f; --accent: #d4a373; --danger: #9e2a2b; --ok: #6b705c; --header: #2c2a28; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 140px; }
        header { background: var(--header); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; }
        
        .dashboard-top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px; }
        .meteo-panel { background: #eaddcf; border-radius: 20px; padding: 15px; text-align: center; border: 1px solid rgba(0,0,0,0.1); }
        .summary-panel { background: var(--card); border-radius: 20px; padding: 12px; font-size: 11px; }
        .big-temp { font-size: 42px; font-weight: 900; color: var(--header); display: block; }

        .container { padding: 0 15px; }
        .section { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); }
        h2 { font-size: 12px; text-transform: uppercase; color: #8a817c; border-bottom: 1px solid #f0edea; padding-bottom: 8px; margin-bottom: 15px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-check { min-height: 55px; background: #fff; border: 2px solid #e0d9d1; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-check.active { background: var(--accent) !important; color: #fff !important; }
        .btn-check.danger.active { background: var(--danger) !important; }

        .media-bar { display: flex; gap: 10px; margin-top: 10px; }
        .btn-media { flex: 1; padding: 15px; border-radius: 12px; border: none; background: #4a443f; color: white; font-size: 12px; font-weight: bold; text-align: center; }

        input, select, textarea { width: 100%; padding: 15px; border: 2px solid #e0d9d1; border-radius: 12px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
        .alarm-badge { background: var(--danger); color: white; padding: 12px; border-radius: 12px; font-weight: 900; display: none; text-align: center; margin-bottom: 15px; }

        .btn-save { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--ok); color: white; padding: 22px; border: none; border-radius: 20px; font-size: 19px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 1000; }
        
        #stats-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div>BEETAG PRO</div>
    <div onclick="showStats()"><i class="fas fa-chart-pie"></i> STATS</div>
</header>

<div class="dashboard-top">
    <div class="meteo-panel">
        <div style="font-size: 10px; font-weight: 800;">AVEZZANO</div>
        <div id="meteo-icon" style="font-size: 45px; margin: 5px 0;"></div>
        <span class="big-temp" id="temp-val">--°</span>
    </div>
    <div class="summary-panel" id="mini-riassunto">
        <strong>ULTIMA VISITA:</strong><br><span id="last-data">ND</span><br>
        <strong>FORZA:</strong> <span id="last-forza">-</span><br>
        <strong>ALLARMI:</strong> <span id="last-alarm">-</span>
    </div>
</div>

<div class="container">
    <div class="section">
        <h2><i class="fas fa-users"></i> Stato Famiglia</h2>
        <div class="grid" id="forza-selector">
            <div class="btn-check" onclick="selectOne(this)">FORTE</div>
            <div class="btn-check" onclick="selectOne(this)">MEDIA</div>
            <div class="btn-check" onclick="selectOne(this)">SCARSA</div>
        </div>
        <div class="grid">
            <div class="btn-check" onclick="selectMulti(this)">COV. OPERCOLATA</div>
            <div class="btn-check" onclick="selectMulti(this)">COV. FRESCA</div>
            <div class="btn-check" onclick="selectMulti(this)">SCORTE</div>
            <div class="btn-check" onclick="selectMulti(this)">POLLINE</div>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-crown"></i> Regina</h2>
        <div class="grid">
            <input type="number" id="reg-anno" placeholder="Anno">
            <select id="reg-colore"><option value="">Colore...</option><option>Verde</option><option>Blu</option><option>Bianco</option><option>Giallo</option><option>Rosso</option></select>
        </div>
        <div class="grid">
            <div class="btn-check" onclick="selectMulti(this)">VISTA</div>
            <div class="btn-check" onclick="selectMulti(this)">NON VISTA</div>
            <div class="btn-check" onclick="selectMulti(this)">MARCATA</div>
            <div class="btn-check danger" onclick="selectMulti(this)">FUCAIOLA</div>
            <div class="btn-check danger" onclick="selectMulti(this)">APE FIGLIATRICE</div>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-lock"></i> Blocco & Sciamatura</h2>
        <div id="blocco-alarm" class="alarm-badge">⚠️ SBLOCCO TRA: <span id="days-to-go">--</span> GG</div>
        <div class="btn-check danger" id="presenza-celle" onclick="selectMulti(this)" style="width: 100%; margin-bottom: 10px;">CELLE REALI</div>
        <label style="font-size: 10px; font-weight: bold;">INIZIO BLOCCO</label>
        <input type="date" id="blocco-inizio" onchange="calcBlocco()">
    </div>

    <div class="section">
        <h2><i class="fas fa-camera"></i> Foto & Audio</h2>
        <div class="media-bar">
            <label class="btn-media"><i class="fas fa-camera"></i> FOTO <input type="file" accept="image/*" capture="camera" style="display:none"></label>
            <label class="btn-media"><i class="fas fa-microphone"></i> AUDIO <input type="file" accept="audio/*" capture style="display:none"></label>
        </div>
    </div>

    <textarea id="note-finali" rows="3" placeholder="Note finali..."></textarea>
    <button class="btn-save" onclick="saveAll()">SALVA TUTTO</button>
</div>

<div id="stats-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Storico Apiario</h3>
        <button onclick="document.getElementById('stats-overlay').style.display='none'">CHIUDI</button>
    </div>
    <div id="stats-list"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const arniaId = params.get('a') || "1";

    function selectOne(el) { el.parentElement.querySelectorAll('.btn-check').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function selectMulti(el) { el.classList.toggle('active'); }

    function calcBlocco() {
        const inizio = new Date(document.getElementById('blocco-inizio').value);
        if(!isNaN(inizio)) {
            const fine = new Date(inizio); fine.setDate(fine.getDate() + 21);
            const diff = Math.ceil((fine - new Date()) / (1000 * 60 * 60 * 24));
            if(diff > 0) { document.getElementById('blocco-alarm').style.display = 'block'; document.getElementById('days-to-go').innerText = diff; }
        }
    }

    async function caricaMeteo() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=42.03&longitude=13.42&current_weather=true`);
            const data = await res.json();
            document.getElementById('temp-val').innerText = Math.round(data.current_weather.temperature) + "°";
            let code = data.current_weather.weathercode;
            let icon = '<i class="fas fa-sun" style="color:#f1c40f"></i>';
            if(code > 3) icon = '<i class="fas fa-cloud" style="color:#95a5a6"></i>';
            document.getElementById('meteo-icon').innerHTML = icon;
        } catch(e) {}
    }

    function saveAll() {
        const d = {
            data: new Date().toLocaleDateString(),
            forza: document.querySelector('#forza-selector .active')?.innerText || "-",
            note: document.getElementById('note-finali').value,
            celle: document.getElementById('presenza-celle').classList.contains('active')
        };
        let history = JSON.parse(localStorage.getItem('beetag_history')) || [];
        history.unshift({arn: arniaId, ...d});
        localStorage.setItem('beetag_history', JSON.stringify(history.slice(0, 50)));
        localStorage.setItem('beetag_last_' + arniaId, JSON.stringify(d));
        alert("Dati salvati!"); location.reload();
    }

    function showStats() {
        const overlay = document.getElementById('stats-overlay');
        overlay.style.display = 'block';
        const list = JSON.parse(localStorage.getItem('beetag_history')) || [];
        document.getElementById('stats-list').innerHTML = list.map(i => 
            `<div style="border-bottom:1px solid #eee; padding:10px;">
                <strong>Arnia ${i.arn}</strong> - ${i.data}<br>Forza: ${i.forza} | ${i.note}
            </div>`).join('');
    }

    window.onload = () => {
        caricaMeteo();
        const last = JSON.parse(localStorage.getItem('beetag_last_' + arniaId));
        if(last) {
            document.getElementById('last-data').innerText = last.data;
            document.getElementById('last-forza').innerText = last.forza;
            document.getElementById('last-alarm').innerText = last.celle ? "CELLE!" : "OK";
        }
    };
</script>
</body>
</html>
